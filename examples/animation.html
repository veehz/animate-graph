<!DOCTYPE html>
<html>
<body>
    <div id="controls" style="margin-bottom: 10px;">
        <!-- Slider will be injected here -->
    </div>
    <div id="graph-container" style="border: 1px solid #ccc; height: 600px;"></div>
    <script type="module">
        import { Graph, Node, Animator, Slider } from "@veehz/animate-graph";

        const animator = new Animator();
        const slider = new Slider("#controls", animator);

        const graph = new Graph("#graph-container", {
            height: document.getElementById("graph-container").clientHeight,
            width: document.getElementById("graph-container").clientWidth
        });

        const nodeA = new Node("n-a", "A");
        const nodeB = new Node("n-b", "B");
        graph.insertNode(nodeA);
        graph.insertNode(nodeB);

        animator.snap(graph);

        setTimeout(() => {
            const nodeC = new Node("n-c", "C");
            graph.insertNodeAfter(nodeC, [nodeA, nodeB]);
            console.log("Added Node C -> [A, B]");
            animator.snap(graph);
        }, 100);

        setTimeout(() => {
            const nodeD = new Node("n-d", "D");
            graph.insertNodeAfter(nodeD, [nodeA, nodeB]);
            console.log("Added Node D -> [A, B]");
            animator.snap(graph);
        }, 200);

        setTimeout(() => {
            const nodeE = new Node("n-e", "E");
            graph.insertNodeAfter(nodeE, [nodeB]);
            console.log("Added Node E -> [B]");
            animator.snap(graph);
        }, 300);

        setTimeout(() => {
            const nodeF = new Node("n-f", "F");
            graph.insertNodeAfter(nodeF, ["n-d", "n-e"]);
            console.log("Added Node F -> [D, E]");
            animator.snap(graph);
        }, 400);

        // Highlighting

        setTimeout(() => {
            graph.color("n-a", 1);
            animator.snap(graph);
        }, 500);

        setTimeout(() => {
            graph.color("n-a-n-d", 1);
            animator.snap(graph);
        }, 600);

        setTimeout(() => {
            graph.color("n-d", 1);
            animator.snap(graph);
        }, 700);

        setTimeout(() => {
            graph.color("n-d-n-f", 1);
            animator.snap(graph);
        }, 800);

        setTimeout(() => {
            graph.color("n-f", 1);
            animator.snap(graph);
        }, 900);

        setTimeout(() => {
            graph.color("n-f", 0);
            animator.snap(graph);
        }, 1000);

        setTimeout(() => {
            graph.color("n-d-n-f", 0);
            animator.snap(graph);
        }, 1100);

        setTimeout(() => {
            graph.color("n-d", 0);
            animator.snap(graph);
        }, 1200);

        setTimeout(() => {
            graph.color("n-a-n-d", 0);
            animator.snap(graph);
        }, 1300);

        setTimeout(() => {
            graph.color("n-a", 0);
            animator.snap(graph);
            animator.last();
        }, 1400);
    </script>
</body>
</html>
