<!DOCTYPE html>
<html>
<head>
    <title>Dijkstra Visualization</title>
    <link rel="stylesheet" href="../../dist/animate-graph.css" />
</head>
<body>
    <div id="controls" style="margin-bottom: 10px;"></div>
    <div id="graph-container" style="border: 1px solid #ccc; height: 600px; width: 100%;"></div>

    <script type="module">
        import { Graph, Node, Edge, Animator, Slider } from "@veehz/animate-graph";

        const animator = new Animator();
        const slider = new Slider("#controls", animator);

        const container = document.getElementById("graph-container");
        const graph = new Graph("#graph-container", {
            height: container.clientHeight,
            width: container.clientWidth
        });

        const root = "A";
        const adj = {
            A: [{target: "B", weight: 4}, {target: "C", weight: 2}],
            B: [{target: "D", weight: 5}],
            C: [{target: "D", weight: 8}, {target: "E", weight: 10}],
            D: [{target: "E", weight: 3}],
            E: []
        };

        // Setup Nodes
        const nodes = {};
        for(const from in adj) {
            nodes[from] = new Node(from, from);
        }

        graph.insertNode(nodes[root]);

        for(const from in adj) {
            const toNodes = adj[from];
            for(const to of toNodes) {
                graph.insertNodesAfter(nodes[to.target], [from]);
                graph.label(Edge.defaultEdgeId(from, to.target), to.weight.toString());
            }
        }

        // initialize labels
        const dist = {};
        const unvisited = new Set();
        for (const [id, node] of Object.entries(nodes)) {
            graph.label(node, "∞");
            dist[id] = Infinity;
            unvisited.add(id);
        }

        dist[root] = 0;
        graph.label(root, "0");
        animator.snap(graph);

        while (unvisited.size > 0) {
            let u = null;
            let minDist = Infinity;
            for (const node of unvisited) {
                if (dist[node] < minDist) {
                    minDist = dist[node];
                    u = node;
                }
            }
            if (u === null) break;

            unvisited.delete(u);
            graph.color(nodes[u], 1);
            animator.snap(graph);

            for (const edge of adj[u]) {
                const v = edge.target;
                const edgeId = Edge.defaultEdgeId(u, v);
                if (!unvisited.has(v)) continue;

                graph.color(edgeId, 1);
                animator.snap(graph);

                const alt = dist[u] + edge.weight;
                if (alt < dist[v]) {
                    dist[v] = alt;
                    graph.label(nodes[v], alt.toString());
                    animator.snap(graph);
                }
                graph.color(edgeId, 0);
            }
        }

        animator.last();

    </script>
</body>
</html>
