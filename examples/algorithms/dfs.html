<!DOCTYPE html>
<html>
<head>
    <title>DFS Visualization</title>
    <link rel="stylesheet" href="../../dist/animate-graph.css" />
</head>
<body>
    <div id="controls" style="margin-bottom: 10px;"></div>
    <div id="graph-container" style="border: 1px solid #ccc; height: 600px; width: 100%;"></div>

    <script type="module">
        import { Graph, Node, Edge, Animator, Slider } from "@veehz/animate-graph";

        const animator = new Animator();
        const slider = new Slider("#controls", animator);

        const container = document.getElementById("graph-container");
        const graph = new Graph("#graph-container", {
            height: container.clientHeight,
            width: container.clientWidth
        });

        // Node and edges
        const root = "A";
        const adj = {
            A: ["B", "C"],
            B: ["D", "E"],
            C: ["E", "F"],
            D: [],
            E: [],
            F: []
        };

        // Setup Nodes
        const nodes = {};
        for(const from in adj) {
            nodes[from] = new Node(from, from);
        }

        graph.insertNode(nodes[root]);

        for(const from in adj) {
            const toNodes = adj[from];
            for(const to of toNodes) {
                graph.insertNodesAfter(nodes[to], [nodes[from]]);
            }
        }

        animator.snap(graph);

        const visited = new Set();
        let counter = 1;
        function dfs(u, parent) {
            graph.color(nodes[u], 1);
            graph.label(nodes[u], `Visited ${counter++}`);
            animator.snap(graph);

            const neighbors = adj[u];
            for (const v of neighbors) {
                if(v !== parent) {
                    dfs(v, u);
                }
            }
            graph.color(nodes[u], 2);
            animator.snap(graph);
        }

        dfs(root, root);

        animator.last();

    </script>
</body>
</html>
