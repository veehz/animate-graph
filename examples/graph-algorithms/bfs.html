<!DOCTYPE html>
<html>
<head>
    <title>BFS Visualization</title>
    <link rel="stylesheet" href="../../dist/animate-graph.css" />
</head>
<body>
    <div id="controls" style="margin-bottom: 10px;"></div>
    <div id="graph-container" style="border: 1px solid #ccc; height: 600px; width: 100%;"></div>

    <script type="module">
        import { Graph, Node, Animator, Slider } from "@veehz/animate-graph";

        const animator = new Animator();
        const slider = new Slider("#controls", animator);

        const container = document.getElementById("graph-container");
        const graph = new Graph("#graph-container", {
            height: container.clientHeight,
            width: container.clientWidth
        });

        animator.snap(graph);

        // Node and edges
        const root = "A";
        const adj = {
            A: ["B", "C"],
            B: ["D", "E"],
            C: ["E", "F"],
            D: [],
            E: [],
            F: []
        };

        // Setup Nodes
        const nodes = {};
        for(const from in adj) {
            nodes[from] = new Node(from, from);
        }

        graph.insertNode(nodes[root]);

        for(const from in adj) {
            const toNodes = adj[from];
            for(const to of toNodes) {
                graph.insertNodesAfter(nodes[to], [nodes[from]]);
            }
        }

        const queue = [root];
        const visited = new Set([root]);

        graph.highlight(nodes[root]);
        graph.label(nodes[root], "0");
        animator.snap(graph);

        let distance = 1;

        while (queue.length > 0) {
            let levelSize = queue.length;

            for (let i = 0; i < levelSize; i++) {
                const u = queue.shift();

                for (const v of adj[u]) {
                    if (!visited.has(v)) {
                        visited.add(v);
                        queue.push(v);

                        graph.highlight(Edge.defaultEdgeId(u, v));
                        animator.snap(graph);

                        graph.highlight(nodes[v]);
                        graph.label(nodes[v], distance.toString());
                        animator.snap(graph);
                    }
                }
            }
            distance++;
        }

        animator.last();

    </script>
</body>
</html>
